# Subtree CI for the self-contained `traceq/` incubation tree
# (see docs/traceq-implementation-plan.md, milestone M0).
#
# Two responsibilities:
#   1. build + test the subtree on Windows AND Linux (the section 8.1 capability
#      matrix is a test plan, not prose);
#   2. the EXTRACTION REHEARSAL - copy `traceq/` out of the touki tree into a
#      bare temp directory and build/test it there. A failure means coupling
#      crept in (a reference to a touki project, or reliance on touki's root
#      props/targets), and it is fixed before merge, not at promotion.
#
# Path-filtered to traceq-touching changes so it stays out of the way of the
# rest of the repo. It is intentionally NOT wired into branch protection during
# incubation.
name: traceq

on:
  pull_request:
    branches: [main]
    paths:
      - traceq/**
      - .github/workflows/traceq.yml
  push:
    branches: [main]
    paths:
      - traceq/**
      - .github/workflows/traceq.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # Build + test the subtree in place on both OSes.
  build-test:
    name: "traceq / build (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    defaults:
      run:
        working-directory: traceq
    steps:
      - uses: actions/checkout@v5

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-traceq-nuget-${{ hashFiles('traceq/**/*.csproj', 'traceq/Directory.Packages.props', 'traceq/Directory.Build.props', 'traceq/Directory.Build.targets', 'traceq/global.json') }}
          restore-keys: |
            ${{ runner.os }}-traceq-nuget-

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: traceq/global.json

      - name: Restore
        run: dotnet restore traceq.slnx

      - name: Build
        run: dotnet build traceq.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test traceq.slnx --configuration Release --no-build

      - name: Help lint
        shell: pwsh
        run: ./tools/Test-CliHelp.ps1 -Configuration Release

      - name: MCP server check
        shell: pwsh
        run: ./tools/Test-McpServer.ps1 -Configuration Release

  # Extraction rehearsal: prove zero coupling by building the subtree as a
  # standalone tree, outside the touki repository, on both OSes.
  rehearsal:
    name: "traceq / extraction rehearsal (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: traceq/global.json

      # Copy ONLY traceq/ into a sibling directory with no touki files above it,
      # then build and test it there. If anything in the subtree depends on
      # touki's root props/targets or a touki project, this fails. Done in one
      # step so the temp path never has to cross a step boundary.
      - name: Build + test as a standalone tree
        shell: pwsh
        run: |
          $dest = Join-Path (Split-Path $env:GITHUB_WORKSPACE -Parent) 'traceq-rehearsal'
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          Copy-Item -Recurse (Join-Path $env:GITHUB_WORKSPACE 'traceq') $dest
          Get-ChildItem -Recurse $dest -Include 'bin', 'obj' -Directory |
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          Push-Location $dest
          try {
            dotnet build traceq.slnx --configuration Release
            if ($LASTEXITCODE -ne 0) { throw "standalone build failed ($LASTEXITCODE)" }
            dotnet test traceq.slnx --configuration Release --no-build
            if ($LASTEXITCODE -ne 0) { throw "standalone test failed ($LASTEXITCODE)" }
          }
          finally {
            Pop-Location
          }
