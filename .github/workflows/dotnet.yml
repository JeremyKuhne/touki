# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  build:
    name: ".NET / build"
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5
      with: { fetch-depth: 0 }
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Build release
      run: dotnet build --configuration Release --no-restore
    - name: Pack (release)
      run: dotnet pack --configuration Release --no-build -o ./artifacts/packages
    - name: Test
      run: |
        $resultsDir = Join-Path $PWD.Path 'artifacts/test-results/debug'
        New-Item -ItemType Directory -Force -Path $resultsDir | Out-Null

        dotnet test --no-build `
          -p:TestingPlatformCaptureOutput=false `
          -- `
          --results-directory "$resultsDir" `
          --report-xunit-trx `
          --show-live-output on
    - name: Test release
      run: |
        $resultsDir = Join-Path $PWD.Path 'artifacts/test-results/release'
        New-Item -ItemType Directory -Force -Path $resultsDir | Out-Null

        dotnet test -c Release --no-build `
          -p:TestingPlatformCaptureOutput=false `
          -- `
          --results-directory "$resultsDir" `
          --report-xunit-trx `
          --show-live-output on `
          --coverage `
          --coverage-output-format cobertura `
          --coverage-settings "$PWD/.config/coverage.settings.xml"
    - name: Generate coverage report
      if: always()
      run: |
        $reportGeneratorVersion = '5.5.9'
        if (dotnet tool list -g | Select-String -SimpleMatch 'dotnet-reportgenerator-globaltool') {
          dotnet tool update -g dotnet-reportgenerator-globaltool --version $reportGeneratorVersion
        }
        else {
          dotnet tool install -g dotnet-reportgenerator-globaltool --version $reportGeneratorVersion
        }

        if (-not (Test-Path artifacts)) {
          Write-Warning 'No artifacts directory found; skipping report generation.'
          exit 0
        }
        $reports = @(
          Get-ChildItem -Path artifacts -Recurse -Filter '*.cobertura.xml' -ErrorAction SilentlyContinue |
            ForEach-Object { $_.FullName }
        )
        if ($reports.Count -eq 0) {
          Write-Warning 'No cobertura reports found; skipping report generation.'
          exit 0
        }
        $reportsArg = ($reports -join ';')
        New-Item -ItemType Directory -Force -Path artifacts/coverage | Out-Null
        reportgenerator `
          "-reports:$reportsArg" `
          -targetdir:artifacts/coverage `
          -reporttypes:'Cobertura;HtmlInline;MarkdownSummaryGithub' `
          -classfilters:'-Touki.Resources.SR;-Touki.Framework.Resources.SRF' `
          -title:'touki'
        if (Test-Path artifacts/coverage/SummaryGithub.md) {
          Get-Content artifacts/coverage/SummaryGithub.md |
            Add-Content -Path $env:GITHUB_STEP_SUMMARY
        }
    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: artifacts/coverage
        if-no-files-found: warn
        retention-days: 14
    - name: Upload coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v5
      with:
        files: artifacts/coverage/Cobertura.xml
        fail_ci_if_error: true
        disable_search: true
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: Upload raw logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mtp-logs
        path: |
          artifacts/test-results/**/*.trx
        if-no-files-found: warn
        retention-days: 14

  macos-build:
    name: ".NET / macos"
    runs-on: macos-latest

    # The repo pins Platform=x64 in Directory.Build.props for the Windows-focused
    # main build, which embeds AMD64 in the managed assembly's COFF header. The
    # macOS GitHub-hosted runner is Apple Silicon (osx-arm64) and the .NET host
    # refuses to load an AMD64-tagged managed assembly. Building this job as
    # AnyCPU produces an architecture-neutral assembly that loads on any host.
    env:
      _PlatformArgs: "-p:Platform=AnyCPU -p:Platforms=AnyCPU"

    steps:
    - uses: actions/checkout@v5
      with: { fetch-depth: 0 }
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
    - name: Restore
      run: dotnet restore touki.tests/touki.tests.csproj $_PlatformArgs
    - name: Build release
      run: dotnet build touki.tests/touki.tests.csproj -c Release -f net10.0 --no-restore $_PlatformArgs
    - name: Test release
      run: |
        resultsDir="$PWD/artifacts/test-results/macos-release"
        mkdir -p "$resultsDir"

        dotnet test touki.tests/touki.tests.csproj -c Release -f net10.0 --no-build \
          $_PlatformArgs \
          -p:TestingPlatformCaptureOutput=false \
          -- \
          --results-directory "$resultsDir" \
          --report-xunit-trx \
          --show-live-output on
    - name: Upload raw logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mtp-logs-macos
        path: |
          artifacts/test-results/**/*.trx
        if-no-files-found: warn
        retention-days: 14

  linux-build:
    name: ".NET / linux"
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
      with: { fetch-depth: 0 }
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
    - name: Install xclip and Xvfb
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends xclip xvfb
    - name: Restore
      run: dotnet restore touki.tests/touki.tests.csproj
    - name: Build release
      run: dotnet build touki.tests/touki.tests.csproj -c Release -f net10.0 --no-restore
    - name: Test release
      run: |
        resultsDir="$PWD/artifacts/test-results/linux-release"
        mkdir -p "$resultsDir"

        xvfb-run --auto-servernum dotnet test touki.tests/touki.tests.csproj -c Release -f net10.0 --no-build \
          -p:TestingPlatformCaptureOutput=false \
          -- \
          --results-directory "$resultsDir" \
          --report-xunit-trx \
          --show-live-output on
    - name: Upload raw logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mtp-logs-linux
        path: |
          artifacts/test-results/**/*.trx
        if-no-files-found: warn
        retention-days: 14
