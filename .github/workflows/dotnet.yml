# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

# Cancel in-flight runs when a force-push to a PR supersedes them. Pushes
# to `main` are NOT queued: `github.head_ref` is empty for non-PR events,
# so the group expression falls through to `github.run_id`, which is
# unique per run. That keeps back-to-back merges into `main` running in
# parallel instead of serializing behind each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # The Windows build runs Debug and Release on two parallel runners.
  # Coverage, pack, and Codecov are Release-only and gated by `matrix.configuration`.
  # The `build` aggregator below depends on both legs and keeps the
  # `.NET / build` status-check name stable for branch protection.
  build-matrix:
    name: ".NET / build (${{ matrix.configuration }})"
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    env:
      # Co-locate the NuGet cache inside the workspace so actions/cache can
      # restore/save it reliably on every OS, avoiding ~/.nuget path quirks
      # under non-bash shells.
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

    steps:
    - uses: actions/checkout@v5
      with: { fetch-depth: 0 }
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ${{ env.NUGET_PACKAGES }}
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'Directory.Build.props', 'Directory.Build.targets', 'global.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --configuration ${{ matrix.configuration }} --no-restore
    - name: Pack
      if: matrix.configuration == 'Release'
      run: dotnet pack --configuration Release --no-build -o ./artifacts/packages
    - name: Test
      run: |
        $configuration = '${{ matrix.configuration }}'
        $resultsDir = Join-Path $PWD.Path "artifacts/test-results/$($configuration.ToLower())"
        New-Item -ItemType Directory -Force -Path $resultsDir | Out-Null

        # MTP args appended only on Release: coverage instrumentation slows tests
        # and Codecov only consumes the Release run.
        $extraArgs = @()
        if ($configuration -eq 'Release') {
          $extraArgs = @(
            '--coverage',
            '--coverage-output-format', 'cobertura',
            '--coverage-settings', "$PWD/.config/coverage.settings.xml"
          )
        }

        dotnet test -c $configuration --no-build `
          -p:TestingPlatformCaptureOutput=false `
          -- `
          --results-directory "$resultsDir" `
          --report-xunit-trx `
          --show-live-output on `
          @extraArgs
    - name: Generate coverage report
      if: always() && matrix.configuration == 'Release'
      run: |
        $reportGeneratorVersion = '5.5.9'
        if (dotnet tool list -g | Select-String -SimpleMatch 'dotnet-reportgenerator-globaltool') {
          dotnet tool update -g dotnet-reportgenerator-globaltool --version $reportGeneratorVersion
        }
        else {
          dotnet tool install -g dotnet-reportgenerator-globaltool --version $reportGeneratorVersion
        }

        if (-not (Test-Path artifacts)) {
          Write-Warning 'No artifacts directory found; skipping report generation.'
          exit 0
        }
        $reports = @(
          Get-ChildItem -Path artifacts -Recurse -Filter '*.cobertura.xml' -ErrorAction SilentlyContinue |
            ForEach-Object { $_.FullName }
        )
        if ($reports.Count -eq 0) {
          Write-Warning 'No cobertura reports found; skipping report generation.'
          exit 0
        }
        $reportsArg = ($reports -join ';')
        New-Item -ItemType Directory -Force -Path artifacts/coverage | Out-Null
        reportgenerator `
          "-reports:$reportsArg" `
          -targetdir:artifacts/coverage `
          -reporttypes:'Cobertura;HtmlInline;MarkdownSummaryGithub' `
          -classfilters:'-Touki.Resources.SR;-Touki.Framework.Resources.SRF' `
          -title:'touki'
        if (Test-Path artifacts/coverage/SummaryGithub.md) {
          Get-Content artifacts/coverage/SummaryGithub.md |
            Add-Content -Path $env:GITHUB_STEP_SUMMARY
        }
    - name: Upload coverage report
      if: always() && matrix.configuration == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: artifacts/coverage
        if-no-files-found: warn
        retention-days: 14
    - name: Upload coverage to Codecov
      if: always() && matrix.configuration == 'Release'
      uses: codecov/codecov-action@v5
      with:
        files: artifacts/coverage/Cobertura.xml
        fail_ci_if_error: true
        disable_search: true
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: Upload raw logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mtp-logs-${{ matrix.configuration }}
        path: |
          artifacts/test-results/**/*.trx
        if-no-files-found: warn
        retention-days: 14

  # Aggregator: preserves the `.NET / build` status-check name so branch
  # protection on `main` doesn't have to be updated. `needs.build-matrix.result`
  # is `success` only when every matrix leg succeeded; any other state fails
  # the aggregator and (transitively) the required check.
  build:
    name: ".NET / build"
    runs-on: ubuntu-latest
    needs: build-matrix
    if: always()
    steps:
    - name: Verify matrix legs
      run: |
        result='${{ needs.build-matrix.result }}'
        echo "build-matrix result: $result"
        if [ "$result" != "success" ]; then
          echo "::error::One or more build-matrix legs did not succeed (result: $result)."
          exit 1
        fi

  macos-build:
    name: ".NET / macos"
    runs-on: macos-latest

    # The repo pins Platform=x64 in Directory.Build.props for the Windows-focused
    # main build, which embeds AMD64 in the managed assembly's COFF header. The
    # macOS GitHub-hosted runner is Apple Silicon (osx-arm64) and the .NET host
    # refuses to load an AMD64-tagged managed assembly. Building this job as
    # AnyCPU produces an architecture-neutral assembly that loads on any host.
    env:
      _PlatformArgs: "-p:Platform=AnyCPU -p:Platforms=AnyCPU"
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

    steps:
    - uses: actions/checkout@v5
      with: { fetch-depth: 0 }
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ${{ env.NUGET_PACKAGES }}
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'Directory.Build.props', 'Directory.Build.targets', 'global.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
    - name: Restore
      run: dotnet restore touki.tests/touki.tests.csproj $_PlatformArgs
    - name: Build release
      run: dotnet build touki.tests/touki.tests.csproj -c Release -f net10.0 --no-restore $_PlatformArgs
    - name: Test release
      run: |
        resultsDir="$PWD/artifacts/test-results/macos-release"
        mkdir -p "$resultsDir"

        dotnet test touki.tests/touki.tests.csproj -c Release -f net10.0 --no-build \
          $_PlatformArgs \
          -p:TestingPlatformCaptureOutput=false \
          -- \
          --results-directory "$resultsDir" \
          --report-xunit-trx \
          --show-live-output on
    - name: Upload raw logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mtp-logs-macos
        path: |
          artifacts/test-results/**/*.trx
        if-no-files-found: warn
        retention-days: 14

  linux-build:
    name: ".NET / linux"
    runs-on: ubuntu-latest
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

    steps:
    - uses: actions/checkout@v5
      with: { fetch-depth: 0 }
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ${{ env.NUGET_PACKAGES }}
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'Directory.Build.props', 'Directory.Build.targets', 'global.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
    - name: Install xclip, Xvfb, and xauth
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends xclip xvfb xauth
    - name: Restore
      run: dotnet restore touki.tests/touki.tests.csproj
    - name: Build release
      run: dotnet build touki.tests/touki.tests.csproj -c Release -f net10.0 --no-restore
    - name: Test release
      run: |
        resultsDir="$PWD/artifacts/test-results/linux-release"
        mkdir -p "$resultsDir"

        xvfb-run --auto-servernum dotnet test touki.tests/touki.tests.csproj -c Release -f net10.0 --no-build \
          -p:TestingPlatformCaptureOutput=false \
          -- \
          --results-directory "$resultsDir" \
          --report-xunit-trx \
          --show-live-output on
    - name: Upload raw logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mtp-logs-linux
        path: |
          artifacts/test-results/**/*.trx
        if-no-files-found: warn
        retention-days: 14
