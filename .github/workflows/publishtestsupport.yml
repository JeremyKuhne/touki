# Publishes a .NET package to NuGet.

name: Publish TestSupport NuGet Package

on:
  workflow_dispatch:

jobs:
  publish:
    name: ".NET / Publish"
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v5
      with: { fetch-depth: 0 }
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'ga'
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build -c Release --no-restore
    - name: Pack
      run: dotnet pack -c Release --no-build -o ./artifacts
    # Get a short-lived NuGet API key
    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }}
    - name: Publish to NuGet
      run: |
        Get-ChildItem -Path ./artifacts -Filter KlutzyNinja.Touki.TestSupport.*.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName `
                --api-key ${{steps.login.outputs.NUGET_API_KEY}} `
                --source https://api.nuget.org/v3/index.json `
                --skip-duplicate
        }
