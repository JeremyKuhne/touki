# Publishes the TestSupport package on its own tag stream (`ts-v*`).
# TestSupport is rarely changed, so it gets an independent version axis from
# the main `KlutzyNinja.Touki` package; cutting a release means pushing a
# tag like `ts-v0.2.0` (matching the MinVerTagPrefix in
# touki.testsupport.csproj). `workflow_dispatch` is also kept for ad-hoc
# republishes.

name: Publish TestSupport NuGet Package

on:
  push:
    tags: ['ts-v*.*.*']
  workflow_dispatch:

jobs:
  publish:
    name: ".NET / Publish"
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v5
      with: { fetch-depth: 0 }
    - name: Validate tag format
      if: github.event_name == 'push'
      shell: pwsh
      run: |
        $tag = '${{ github.ref_name }}'
        if ($tag -notmatch '^ts-v\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
          Write-Error "Tag '$tag' does not match expected SemVer pattern ts-v<major>.<minor>.<patch>[-<prerelease>]."
          exit 1
        }
        Write-Host "Tag '$tag' OK."
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build -c Release --no-restore
    - name: Pack
      run: dotnet pack -c Release --no-build -o ./artifacts
    # Get a short-lived NuGet API key
    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }}
    - name: Publish to NuGet
      run: |
        Get-ChildItem -Path ./artifacts -Filter KlutzyNinja.Touki.TestSupport.*.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName `
                --api-key ${{steps.login.outputs.NUGET_API_KEY}} `
                --source https://api.nuget.org/v3/index.json `
                --skip-duplicate
        }
