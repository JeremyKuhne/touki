name: Agent files

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: Validate agent customization files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            agent:
              - AGENTS.md
              - '**/AGENTS.md'
              - .github/copilot-instructions.md
              - .github/instructions/**
              - .github/prompts/**
              - .github/agents/**
              - .agents/**
              - .vscode/mcp.json
              - docs/agent-customization.md
              - docs/binary-formatted-object-performance.md
              - docs/filtrace-local-demo.md
              - docs/performance-investigation.md
              - docs/performance-investigation-without-mcp.md
              - docs/performance-investigation-agent-tooling-retrospective.md
              - tools/Validate-AgentFiles.ps1
              - tools/Validate-AgentSkills.ps1
              - .markdownlint.jsonc
              - .github/workflows/agent-files.yml

      - name: Validate frontmatter, mirror, whitespace
        if: steps.changes.outputs.agent == 'true'
        shell: pwsh
        run: pwsh tools/Validate-AgentFiles.ps1

      - name: Validate skill catalog and overlays
        if: steps.changes.outputs.agent == 'true'
        shell: pwsh
        run: pwsh tools/Validate-AgentSkills.ps1

      - name: Skill freshness warning (90 days)
        if: steps.changes.outputs.agent == 'true'
        shell: pwsh
        run: |
          $threshold = (Get-Date).AddDays(-90)
          $skillDirs = Get-ChildItem -Directory -Path '.agents/skills' -ErrorAction SilentlyContinue
          $stale = @()
          foreach ($dir in $skillDirs) {
              $rel = ".agents/skills/$($dir.Name)"
              $lastCommit = git log -1 --format=%cI -- $rel 2>$null
              if (-not $lastCommit) { continue }
              $when = [DateTime]::Parse($lastCommit)
              if ($when -lt $threshold) {
                  $stale += "$($dir.Name) (last touched $($when.ToString('yyyy-MM-dd')))"
              }
          }
          if ($stale.Count -gt 0) {
              foreach ($s in $stale) { Write-Host "::warning::Skill stale: $s" }
          } else {
              Write-Host 'OK: all skills touched within the last 90 days.'
          }

      - name: markdownlint
        if: steps.changes.outputs.agent == 'true'
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            AGENTS.md
            .github/copilot-instructions.md
            .github/instructions/**/*.md
            .github/prompts/**/*.md
            .github/agents/**/*.md
            .agents/**/*.md
            docs/agent-customization.md
            docs/binary-formatted-object-performance.md
            docs/filtrace-local-demo.md
            docs/performance-investigation.md
            docs/performance-investigation-without-mcp.md
            docs/performance-investigation-agent-tooling-retrospective.md
          config: .markdownlint.jsonc

      - name: Link check
        if: steps.changes.outputs.agent == 'true'
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --offline
            AGENTS.md
            .github/copilot-instructions.md
            .github/instructions/**/*.md
            .github/prompts/**/*.md
            .github/agents/**/*.md
            .agents/**/*.md
            docs/agent-customization.md
            docs/binary-formatted-object-performance.md
            docs/filtrace-local-demo.md
            docs/performance-investigation.md
            docs/performance-investigation-without-mcp.md
            docs/performance-investigation-agent-tooling-retrospective.md
          fail: true
