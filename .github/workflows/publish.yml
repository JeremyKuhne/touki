# Publishes a .NET package to NuGet when a new tag is pushed.
#
# `workflow_dispatch` is also supported for ad-hoc republishes; it requires
# the caller to supply the existing tag they want to publish, which the
# workflow then checks out and validates. This avoids accidentally
# publishing a `0.0.0-alpha.0.<height>` MinVer fallback by dispatching
# from `main` with no tag context.

name: Publish NuGet Package

on:
  push:
    tags: ['v*.*.*']        # fires on v0.1.0, v0.1.0-rc.1, etc.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v0.1.0-alpha.13)'
        required: true
        type: string

jobs:
  publish:
    name: ".NET / Publish"
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read

    env:
      # `github.ref_name` for push, the dispatched input for manual runs.
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
        ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
    - name: Validate tag format
      shell: pwsh
      run: |
        $tag = $env:RELEASE_TAG
        # SemVer numeric identifiers (major/minor/patch) MUST NOT have leading zeros.
        if ($tag -notmatch '^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(-[0-9A-Za-z.-]+)?$') {
          Write-Error "Tag '$tag' does not match expected SemVer pattern v<major>.<minor>.<patch>[-<prerelease>] (no leading zeros)."
          exit 1
        }
        Write-Host "Tag '$tag' OK."
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build -c Release --no-restore
    - name: Pack
      run: dotnet pack -c Release --no-build -o ./artifacts
    # Get a short-lived NuGet API key
    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }}
    - name: Publish to NuGet
      run: |
        Get-ChildItem -Path ./artifacts -Filter KlutzyNinja.Touki.*.nupkg |
            Where-Object { $_.Name -notlike 'KlutzyNinja.Touki.TestSupport.*' } |
            ForEach-Object {
                dotnet nuget push $_.FullName `
                    --api-key ${{steps.login.outputs.NUGET_API_KEY}} `
                    --source https://api.nuget.org/v3/index.json `
                    --skip-duplicate
            }
